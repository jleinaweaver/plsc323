### When the weather person tells you there is a 25% chance of rain today, what does that actually mean?

(They ran a fancy computer simulation of today a bunch of times and on one quarter of their simulations it rained, and on 3/4's of them it didn't)

Let's compare and contrast these amounts.

### What do we learn from these answers?

#### + Is there a correct answer?

&lt;br&gt;

No, Everyone has a different relationship with risk.

- Some people are more / less willing to take on risk to win profit.

Not right or wrong, just different willingness to risk.

- Some people are more risk acceptant and others are more risk averse.

&lt;br&gt;

### Why aren't all the numbers in the $100 game exactly 20 times the answers in the $5 game column?

#### - What does all this tell us about human decision-making?

&lt;br&gt;

Your relationship to risk is sensitive to both the size of the risk AND the size of the reward!

- Some people will be willing to accept risk when the reward is huge, but not when it is small (e.g. playing the lottery)

&lt;br&gt;

For our purposes, we should keep in mind that two people presented with the same rules may each choose to behave differently because of their different willingness to accept risk.
