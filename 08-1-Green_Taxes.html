Last week we explored command and control regulations.

### In super broad strokes, what does it mean to use a regulatory approach for addressing an environmental problem?

- (Create rules that alter the behavior of specific actors)
    - Firms must use technology X or cannot emit more than a set limit of pollution Y

+ (In econ speak, per textbook: Using rules to force polluters to adapt their production functions to the social costs of pollution)

&lt;br&gt;

SLIDE: Let's make sure we're all clear on the supply and demand diagram from last week



---

&lt;img src="08-1-Green_Taxes_files/figure-html/unnamed-chunk-2-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

### What does the supply line represent and why is it increasing?
- (Marginal costs e.g. amount it costs to produce one more widget)
- (Assumes marginal costs increase with quantity of product produced, e.g. sourcing more materials for your factory or building new equipment to extract oil from harder to work places, etc.)

### What does the demand line represent and why is it decreasing?
- (Amount of widgets you can sell at a given price point)
- (Only so many people want the product at all and (almost) everyone's desire for it will be sensitive to the price you charge for it.)

### As the owner of the factory how many widgets should I make?
- (Equilibrium point where the lines cross maximizes your profit given the costs of production)
- Producer surplus: The profit earned by the factory is the area between the dashed horizontal line and the blue line
- Consumer surplus: Area above dashed horizontal line up to red line is the amount of money consumers get to keep

### And how do we change the visualization if we add a C&amp;C regulation requiring a specific technology or an absolute emission limit?

(SLIDE)
  
  
---

&lt;img src="08-1-Green_Taxes_files/figure-html/unnamed-chunk-3-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

Rules that mandate emissions limits or the specific techology a factory has to use increases the marginal costs of production.

- This shifts the equilibrium point to the left

- The factory will produce fewer widgets and charge a higher price for them

- The net effect on the economy is complicated and can either be positive or negative depending on the design of the regulation.

&lt;br&gt;

Last week we explored this approach to environmental problem-solving using case studies, opinion pieces and reviews of empirical research.

### Bottom line, what do we, as policy-designers, need to keep in mind if we chose to address an environmental problem with command and control type regulations?

- Be careful of economy wide effects (overall effect on the economy is hard to predict, could grow or shrink depending on many other factors involved)
    - Must be paired with assistance for impacted workers?

- Be careful of political interests in the design (lobbying and/or protection of well connected industries)

- Regulations have got to keep up with changes in the market and technology (no drift!)

- Depends on balance of "dirty" vs "clean" industries in the target economy

- C&amp;C most realistic if changes are small OR industries carefully targeted?

- Enforcement at the individual level is hard if community doesn't buy-in

### Based on the open econ textbook reading, talk me through the basics of using a tax, or "pollution charge," to address an environmental problem.

- (Instead of mandating a specific technology or emissions limit with a rule, use a tax to make some of the costs of the pollution you create part of your production function)  

&lt;br&gt;

Let's hit some of the key pieces we'll need to keep in mind if we were to use this approach in our own projects.

### What in the world is this meant to show me? Can anybody explain this in English?

1. Figure 1 illustrates the marginal costs that a firm faces in reducing pollution
    - In other words, how much a firm would need to spend to reduce emissions by various amounts
    - Increases with output because "the firm can use the cheapest and easiest method to make initial reductions in pollution, but additional reductions in pollution become more expensive."
    
2. Facing a $1k pollution tax the firm should cut its emissions by 30lb and then pay the tax for any additional emissions
    - The firm can eliminate 10lb of its emissions for $300, the next 10lb (20 total) for $500 and the next 10lb (30 total) for $900!
    - Cheaper to reduce pollution for 10, 20 and 30lb so do that
    - Cheaper to pay the tax for the 40 and 50lb amounts so do that
    
### Figure make sense?

- This represents a marginal cost focused not on producing widgets but on tracking the pollution you create with each widget and the firm's capacity to cut the costs of those emissions.

&lt;img src="08-1-Green_Taxes_files/figure-html/unnamed-chunk-5-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

Let's take this back to the realm of polluting industries.

- Here we a slight variation on our supply and demand curves.

Each of these lines represent a different firm that produces pollution in its normal production processes.

- What's important here is to note that each firm has very different abatement costs.



---

&lt;img src="08-1-Green_Taxes_files/figure-html/unnamed-chunk-6-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

Let's say Firm A is an old established widget factory and Firm B is an upstart factory that has invented a more efficient widget production process.

Here we see that using its old machines Firm A would have to spend 108 to abate 40 tons of pollution. 



---

&lt;img src="08-1-Green_Taxes_files/figure-html/unnamed-chunk-7-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

However, Firm B could abate the same amount of pollution at less than half the price (50)!

If our goal is to see widget production remain somewhat constant but pollution to fall what we need is a policy that rewards cleaner production and incentivizes innovation!

- Hence the "green" tax!


---

&lt;img src="08-1-Green_Taxes_files/figure-html/unnamed-chunk-8-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

Back to our supply and demand curves in the presence of a C&amp;C regulation.

- Here we see how the C&amp;C approach often achieves great reductions but stops with the established mandate.

- Firms often install the required technology but have no additional incentive to invest further.

&lt;br&gt;

In the intial moment of implenting a "green" tax, the curves look like this as well.

- The tax increases all firms marginal costs.

HOWEVER, as we just saw not all firms have the same MC curve!

- The tax hits each firm differently.

- Rather than mandating everyone has to ride a bike or buy an electric car this approach sets a price on the social cost of pollution and let's everyone make their own choices for how to cover those costs.




---

&lt;img src="08-1-Green_Taxes_files/figure-html/unnamed-chunk-9-1.gif" width="95%" style="display: block; margin: auto;" /&gt;

???

Designing a tax means using the power of the market to reduce pollution.

- Markets, as all good capitalists know, move MUCH faster and more efficiently to produce profits than top-down regulators possibly can.

- The key is that the tax makes finding a way to pollute less during production a profit-maximizing decision.

- If you make "being green" profitable then the market will take care of it for you.

&lt;br&gt;

Rather than mandating one type of technology or one allowable emission level the tax creates an incentive to constantly innovate.

- Any firm that can develop a process that produces widgets at a lower MC can enter the market and be successful.

&lt;br&gt;

Note, C&amp;C regulations also create incentives like this but typically not in as dynamic a fashion.
